name: Daily Investment News Bot

on:
  schedule:
    # 毎朝6:00 JST（21:00 UTC）
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  create-draft:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Fetch RSS feeds
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python src/rss_fetcher.py
    
    - name: Select best article
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python src/article_selector.py
    
    - name: Translate and create draft
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python src/translator.py
    
    - name: Commit and push draft
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add _drafts/
        git commit -m "Add daily draft $(date +%Y-%m-%d)" || exit 0
        git push
